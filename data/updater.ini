[Updater]
[$]
;mode=table
;background=false
;header=false
;gap=10


[Update CFW Pack]
try:
download https://github.com/dominatorul/Nx-Carnage/latest/releases/download/NxCarnage.zip /config/ultrahand/downloads/NxCarnage.zip 
unzip /config/ultrahand/downloads/NxCarnage.zip /config/ultrahand/downloads/NxCarnage
move '/config/ultrahand/downloads/NxCarnage/' '/'
delete /config/ultrahand/downloads/NxCarnage.zip
delete /config/ultrahand/downloads/NxCarnage/
reboot

[*Update Firmware]
;mode=forwarder
package_source './firmware.ini'
